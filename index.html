<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#26190E" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <title>DARTS KING ー 練習・対戦・レーティング</title>
    <style>
      /* ノッチ/ホームバー領域までテーマ色で塗る */
      html, body { background: #26190E; }
      /* アプリのルート要素(背景付きdiv)の内側にセーフエリア分の余白を取る。
         こうすることで背景はノッチ裏まで広がりつつ、UIは被らない。 */
      #root > div {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        box-sizing: border-box;
      }
      /* タップ時のハイライトと長押し選択を無効化(ネイティブらしい操作感に) */
      * { -webkit-tap-highlight-color: transparent; }
      body { -webkit-user-select: none; user-select: none; }
    </style>
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
